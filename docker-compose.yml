version: "3.9"

services:
  backend:
    build: ./backend
    container_name: resume-optimizer-backend
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ENVIRONMENT=development
    volumes:
      - ./backend:/app
      - /tmp/resume-optimizer:/tmp/resume-optimizer
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: resume-optimizer-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

networks:
  default:
    name: resume-optimizer-network
